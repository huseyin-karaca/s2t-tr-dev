_comment_: "VoxPopuli v2. class_balanced_loss is DISABLED because the weights in train.py were hardcoded for the AMI dataset. Whisper is terrible on VoxPopuli, so we rely on soft_ce to guide the model safely. Veri seti bize bağirarak şunu söylüyor: Benim içimde birbirini mükemmel tamamlayan (correlation ~0) çok iyi iki expert (HuBERT ve Whisper) var. Eğer bir model (router) sadece HuBERT'i seçerse %23 WER alir, sadece Whisper'i seçerse %120 WER alir. Ama akillica ikisi arasinda geçiş yaparsa %16 WER alir. Fakat bizim modellerimiz (ister Transformer olsun, ister MLP) Whisper'i seçmeye ÇOK KORKUYORLAR. Çünkü Soft-CE fonksiyonunda, Whisper'in halüsinasyon gördüğü o nadir %120 WER'lik yerler o kadar ağir bir penalti (ceza) yaratiyor ki, model Whisper'i seçmeyi öğrenmektense güvenli liman olan HuBERT'i %100 oraninda seçip %23 WER ile yetinmeyi öğreniyor. Bu sorunu makalede harika bir argümana dönüştürebiliriz: Whisper gibi modeller outlier hatalara (halüsinasyon) yatkindir. Ortalama WER'leri çok kötü olsa bile (%120), oracle olarak frekanslari (%46) çok yüksektir. Geleneksel Mean-Pool MLP bu iki model arasinda ayrim yapamazken (veya risk alamazken), bizim hiyerarşik modelimiz... gibi bir tartişma bölümü (Discussion) yaratabilirsin. V2 config'te soft_ce_temperature'i 1.0'a çekerek ve aux_ce_weight'i 0.5 yaparak tam da bu korkakliği kirmaya çaliştim. Modelin Soft-CE cezalarindan daha az korkmasini ve %46 oraninda iyi olan Whisper'i keşfetmesini sağlamak istedik. Eğer V2 Config'te Transformer'in Whisper'i seçme orani (Freq_W) %10-20 bandina çikip Test_WER %20'lere inebilirse, makaleniz tam bir hit olacak! V2 sonuçlarini merakla bekliyorum."
parquet_path: "data/processed/facebook_voxpopuli/combined_features_with_transcripts.parquet"
shared:
  train_ratio: 0.8
  val_ratio: 0.1
  max_seq_len: 2000
  batch_size: 128
  num_workers: 4
  max_epochs: 50
  learning_rate: 1e-4
  precision: "bf16-mixed"
  eager_load: true
  allow_tf32: false
  test_average_epochs: 1
  early_stopping_patience: 8

methods:
  # 1. Standard Baseline (MLP Architecture)
  - name: "mlp_pool_hard_ce_voxpopuli_v2"
    arch: "mlp_pool"
    primary_weight: 0.0
    aux_ce_weight: 1.0
    soft_ce_weight: 0.0
    class_balanced_loss: false  # CRITICAL FIX
    seed: [42, 2, 123]

  # 2. Proposed Final Model (New Architecture + Proposed Loss)
  - name: "hierarchical_transformer_proposed_voxpopuli_v2"
    arch: "hierarchical_transformer"
    primary_weight: 1.0
    aux_ce_weight: 0.5     # Increased slightly to give a stronger signal 
    soft_ce_weight: 0.5
    soft_ce_temperature: 1.0 # Lowered slightly to sharpen the soft labels
    class_balanced_loss: false # CRITICAL FIX
    seed: [42, 2, 123]
