_comment_: "VoxPopuli v4. Testing dynamic class-balanced loss before swapping the base model. Uses the same hyperparams as V2, but with class_balanced_loss=true to see if correct inverse frequencies help the model pick Whisper when appropriate."
parquet_path: "data/processed/facebook_voxpopuli/combined_features_with_transcripts.parquet"
shared:
  train_ratio: 0.8
  val_ratio: 0.1
  max_seq_len: 2000
  batch_size: 128
  num_workers: 4
  max_epochs: 50
  learning_rate: 1e-4
  precision: "bf16-mixed"
  eager_load: true
  allow_tf32: false
  test_average_epochs: 1
  early_stopping_patience: 8

methods:
  # 1. Standard Baseline (MLP Architecture)
  - name: "mlp_pool_hard_ce_voxpopuli_v4"
    arch: "mlp_pool"
    primary_weight: 0.0
    aux_ce_weight: 1.0
    soft_ce_weight: 0.0
    class_balanced_loss: true  # DYNAMICALLY COMPUTED OVER TRAIN SET NOW
    seed: [42, 2, 123]

  # 2. Proposed Final Model (New Architecture + Proposed Loss)
  - name: "hierarchical_transformer_proposed_voxpopuli_v4"
    arch: "hierarchical_transformer"
    primary_weight: 1.0
    aux_ce_weight: 0.5
    soft_ce_weight: 0.5
    soft_ce_temperature: 1.0
    class_balanced_loss: true  # DYNAMICALLY COMPUTED OVER TRAIN SET NOW
    seed: [42, 2, 123]
