_comment_: "Final manuscript experiment. Proposed model uses soft CE with a balanced aux loss. Baseline is standard MLP with Hard CE."
parquet_path: "data/processed/edinburghcstr_ami/combined_features_with_transcripts.parquet"
shared:
  train_ratio: 0.8
  val_ratio: 0.1
  max_seq_len: 2000
  batch_size: 128
  num_workers: 4
  max_epochs: 50
  learning_rate: 1e-4
  precision: "bf16-mixed"
  eager_load: true
  allow_tf32: false
  test_average_epochs: 1
  early_stopping_patience: 8

methods:
  # 1. Standard Baseline (MLP Architecture + Standard Hard CE Loss)
  - name: "mlp_pool_hard_ce"
    arch: "mlp_pool"
    primary_weight: 0.0
    aux_ce_weight: 1.0
    soft_ce_weight: 0.0
    class_balanced_loss: true
    seed: [42, 2, 123]

  # 2. Proposed Final Model (New Architecture + Proposed Loss)
  # Uses aux_ce_weight=0.3 to allow the soft loss and primary loss to guide the hierarchy optimally.
  - name: "hierarchical_transformer_proposed"
    arch: "hierarchical_transformer"
    primary_weight: 1.0
    aux_ce_weight: 0.3     
    soft_ce_weight: 0.5
    soft_ce_temperature: 1.5
    class_balanced_loss: true
    seed: [42, 2, 123]
