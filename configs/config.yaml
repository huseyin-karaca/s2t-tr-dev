defaults:
  - _self_
  - experiments: null

# Pipeline Run Configs
output_dir: "reports"
skip_training_free: false
skip_rover: false

# Data Defaults
parquet_path: "data/processed/edinburghcstr_ami/combined_features.parquet"
train_ratio: 0.8
val_ratio: 0.1
max_seq_len: 2000
batch_size: 128
num_workers: 0

# Parquet loading strategy.
eager_load: false
auto_rechunk: true
target_row_group_size: 256
parquet_cache_dir: null
row_group_cache_size: null

# Model Defaults
arch: "hierarchical_transformer"
d_model: 256
n_heads: 4
stage1_layers: 2
stage2_layers: 1
ffn_dim: 512
dropout: 0.15
no_cross_attention: false
separate_stage1: false
mlp_hidden: 1024
mlp_layers: 2

# Training Defaults
learning_rate: 2e-4
weight_decay: 1e-2
warmup_steps: 200
max_epochs: 50
primary_weight: 1.0
aux_ce_weight: 0.3
soft_ce_weight: 0.5
soft_ce_temperature: 0.5
label_smoothing: 0.1
class_balanced_loss: false
gradient_clip_val: 1.0
early_stopping_patience: 5
deterministic: false
seed: 42
limit_batches: null

# Checkpointing / Testing
test_average_epochs: 1

# Compute / Hardware
precision: "16-mixed"
allow_tf32: true

# Logging
experiment_name: "asr_selector"
log_dir: "logs"
progress_bar_refresh: 20
