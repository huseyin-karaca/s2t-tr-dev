defaults:
  - _self_
  - experiment: null

# Data
parquet_path: "data/processed/edinburghcstr_ami/combined_features.parquet"
train_ratio: 0.8
val_ratio: 0.1
max_seq_len: 2000
batch_size: 128
num_workers: 0

# Parquet loading strategy.
#   eager_load:             if True, decode the entire feature parquet into
#                           per-expert flat numpy buffers + offsets at startup
#                           and serve every batch from RAM (no per-batch
#                           parquet decode). Recommended on hosts with
#                           enough system RAM (~40 GB for AMI). Multi-worker
#                           DataLoaders share the buffers via fork+COW.
#                           Set false on tight-RAM machines to fall back to
#                           the lazy row-group reader.
#   auto_rechunk:           if True, transparently rewrite the input parquet
#                           with small row groups when needed (fixes Colab
#                           DataLoader OOMs caused by single-row-group
#                           inputs). Also bounds peak RAM during the
#                           eager-mode streaming decode. Cached on local
#                           disk after first run.
#   target_row_group_size:  rows per row group in the rechunked cache.
#   parquet_cache_dir:      where to put the rechunked cache. null => use
#                           $S2T_PARQUET_CACHE or $TMPDIR/s2t-tr-dev-cache.
#   row_group_cache_size:   per-worker LRU cache for lazy mode. null =>
#                           sensible default.
eager_load: false
auto_rechunk: true
target_row_group_size: 256
parquet_cache_dir: null
row_group_cache_size: null

# Model
arch: "hierarchical_transformer"
d_model: 256
n_heads: 4
stage1_layers: 2
stage2_layers: 1
ffn_dim: 512
dropout: 0.15
no_cross_attention: false
separate_stage1: false
mlp_hidden: 1024
mlp_layers: 2

# Training
learning_rate: 2e-4
weight_decay: 1e-2
warmup_steps: 200
max_epochs: 50
primary_weight: 1.0
aux_ce_weight: 0.3
soft_ce_weight: 0.5
soft_ce_temperature: 0.5
label_smoothing: 0.1
class_balanced_loss: false
gradient_clip_val: 1.0
early_stopping_patience: 5
deterministic: false
seed: 42
limit_batches: null

# Compute / Hardware
precision: "16-mixed"

# Logging
experiment_name: "asr_selector"
log_dir: "logs"
progress_bar_refresh: 20
