_comment_: "Experiment v4: Showcasing the proposed Hierarchical Transformer against a standard MLP classification baseline."
parquet_path: "data/processed/edinburghcstr_ami/combined_features_with_transcripts.parquet"
shared:
  train_ratio: 0.8
  val_ratio: 0.1
  max_seq_len: 2000
  batch_size: 128
  num_workers: 4
  max_epochs: 50
  learning_rate: 2e-4
  seed: 42
  precision: "bf16-mixed"
  eager_load: true
  
  # Reproducibility settings
  allow_tf32: false

methods:
  # 1. Baseline: Simple MLP with standard classification loss (Hard CE)
  # This represents a naive approach to expert selection without our novel WER-aware loss components.
  - name: "mlp_pool_hard_ce"
    arch: "mlp_pool"
    primary_weight: 0.0       # Disable weighted WER loss
    aux_ce_weight: 1.0        # Pure classification
    soft_ce_weight: 0.0       # Disable Soft CE
    class_balanced_loss: true # Keep class balancing for fairness
    test_average_epochs: 1    # Standard single-checkpoint test

  # 2. Proposed: Hierarchical Transformer with Full Mixed Loss + Checkpoint Averaging
  # This uses all the novelties: Architecture + Primary WER + Soft CE + Hard CE + Model Averaging
  - name: "hierarchical_transformer_proposed"
    arch: "hierarchical_transformer"
    primary_weight: 1.0
    aux_ce_weight: 0.3
    soft_ce_weight: 0.5
    soft_ce_temperature: 1.5
    class_balanced_loss: true
    test_average_epochs: 3    # Use the new feature: average top 3 checkpoints for maximum stability and performance
