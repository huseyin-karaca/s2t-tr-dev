_comment_: "Experiment v6: Comprehensive ablation study. Fixed Soft Loss Collapse by increasing aux_ce_weight to 1.0"
parquet_path: "data/processed/edinburghcstr_ami/combined_features_with_transcripts.parquet"
shared:
  train_ratio: 0.8
  val_ratio: 0.1
  max_seq_len: 2000
  batch_size: 128
  num_workers: 4
  max_epochs: 50
  learning_rate: 1e-4
  precision: "bf16-mixed"
  eager_load: true
  allow_tf32: false
  test_average_epochs: 3

methods:
  # 1. Standard Baseline (Old Architecture + Old Loss)
  - name: "mlp_pool_hard_ce"
    arch: "mlp_pool"
    primary_weight: 0.0
    aux_ce_weight: 1.0
    soft_ce_weight: 0.0
    class_balanced_loss: true
    seed: [42, 0, 2]

  # 2. Architecture Ablation (New Architecture + Old Loss)
  # Proves the hierarchical mechanism improves stability.
  - name: "hierarchical_transformer_hard_ce"
    arch: "hierarchical_transformer"
    primary_weight: 0.0
    aux_ce_weight: 1.0
    soft_ce_weight: 0.0
    class_balanced_loss: true
    seed: [42, 0, 2]

  # 3. Proposed Final Model (New Architecture + New Loss)
  # Fixed Soft Loss Collapse: aux_ce_weight increased to 1.0 to anchor early training.
  - name: "hierarchical_transformer_proposed"
    arch: "hierarchical_transformer"
    primary_weight: 1.0
    aux_ce_weight: 1.0      # MUST BE 1.0 to prevent collapse on bad seeds (like seed 0)
    soft_ce_weight: 0.5
    soft_ce_temperature: 1.5
    class_balanced_loss: true
    seed: [42, 0, 2]
