_comment_: "Optimized for NVIDIA RTX PRO 6000 Blackwell. Massive VRAM utilization."
parquet_path: "data/processed/edinburghcstr_ami/combined_features_with_transcripts.parquet"
shared:
  train_ratio: 0.8
  val_ratio: 0.1
  max_seq_len: 2000
  batch_size: 128
  num_workers: 8
  max_epochs: 50
  learning_rate: 2e-4
  primary_weight: 1.0
  aux_ce_weight: 0.0
  soft_ce_weight: 0.5
  soft_ce_temperature: 1.5
  class_balanced_loss: true
  seed: 42
  precision: "bf16-mixed" # Added for high end GPUs
methods:
  - name: "mlp_pool"
    arch: "mlp_pool"
  - name: "hierarchical_transformer"
    arch: "hierarchical_transformer"
